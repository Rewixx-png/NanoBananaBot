<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window.onmessage = async (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'poll') {
    try {
      const r = await fetch(msg.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: msg.secret }),
      });
      const data = await r.json();
      parent.postMessage({
        pluginMessage: {
          type: 'poll-result',
          session_id: data.session_id || null,
          spec: data.spec || null,
        }
      }, '*');
    } catch (_) {
      parent.postMessage({ pluginMessage: { type: 'poll-done' } }, '*');
    }
  }

  if (msg.type === 'done') {
    try {
      await fetch(msg.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          secret: msg.secret,
          session_id: msg.session_id,
          node_id: msg.node_id,
          error: msg.error || null,
        }),
      });
    } catch (_) {}
    parent.postMessage({ pluginMessage: { type: 'poll-done' } }, '*');
  }
};
</script>
</body>
</html>
