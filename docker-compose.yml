services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram_bot_api
    user: "0:0"
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "18082:8081"
    volumes:
      - tiktokhatanibot_telegram-bot-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8081"]
      interval: ${TELEGRAM_API_HEALTH_INTERVAL:-10s}
      timeout: ${TELEGRAM_API_HEALTH_TIMEOUT:-5s}
      retries: ${TELEGRAM_API_HEALTH_RETRIES:-5}
      start_period: ${TELEGRAM_API_HEALTH_START_PERIOD:-10s}

  nano-hatani-bot:
    build: .
    container_name: nano_hatani_bot
    restart: unless-stopped
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TELEGRAM_API_URL: http://telegram-bot-api:8081
    ports:
      - "7432:7432"
    working_dir: /root/Projects/NanoHatani
    volumes:
      - /root/Projects/NanoHatani:/root/Projects/NanoHatani
      - /root/RewTest:/root/RewTest
      - /root/cookies:/root/cookies
      - tiktokhatanibot_telegram-bot-api-data:/var/lib/telegram-bot-api:ro

volumes:
  tiktokhatanibot_telegram-bot-api-data:
