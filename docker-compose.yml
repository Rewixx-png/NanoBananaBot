services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram_bot_api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "18081:8081"
    volumes:
      - tiktokhatanibot_telegram-bot-api-data:/var/lib/telegram-bot-api

  nano-hatani-bot:
    build: .
    container_name: nano_hatani_bot
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    working_dir: /root/Projects/NanoHatani
    volumes:
      - /root/Projects/NanoHatani:/root/Projects/NanoHatani
      - /root/RewTest:/root/RewTest
      - /root/cookies:/root/cookies
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes/tiktokhatanibot_telegram-bot-api-data/_data:/var/lib/docker/volumes/tiktokhatanibot_telegram-bot-api-data/_data

volumes:
  tiktokhatanibot_telegram-bot-api-data:
